global
    # Keep control in the launcher (iiab-termux). Avoid implicit daemonizing here.
    log stdout format raw local0
    maxconn 256

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend fe_boxlan
    bind 127.0.0.1:8080
    # Preserve the hostname the user typed (box / box.local / box.lan)
    http-request set-var(txn.req_host) req.hdr(Host)
    # Some backends build redirects based on X-Forwarded-*.
    http-request set-header X-Forwarded-Host %[var(txn.req_host)]
    http-request set-header X-Forwarded-Proto http
    default_backend be_iiab

backend be_iiab
    server iiab 127.0.0.1:8085
    # Fix absolute redirects coming from the origin (often :8085 or localhost/127.0.0.1).
    http-response replace-header Location ^(https?://)(127\.0\.0\.1|localhost)(:8085)?(/.*)?$ \1%[var(txn.req_host)]\4
    http-response replace-header Location ^(https?://)([^/]+):8085(/.*)?$ \1%[var(txn.req_host)]\3
    # If something ever produces a broken "Location: http://", sanitize it.
    http-response replace-header Location ^https?://$ http://%[var(txn.req_host)]/
