global
    # Keep control in the launcher (iiab-termux). Avoid implicit daemonizing here.
    log stdout format raw local0
    maxconn 256


defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend fe_boxlan
    bind 127.0.0.1:8080
    # http-request set-header Host box.lan
    default_backend be_iiab

backend be_iiab
    server iiab 127.0.0.1:8085
    http-response replace-header Location ^(https?://)box\.lan:8085(.*)$ \1box.lan\2
