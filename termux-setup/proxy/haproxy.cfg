global
    # Keep control in the launcher (iiab-termux). Avoid implicit daemonizing here.
    log stdout format raw local0
    maxconn 256

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend fe_boxlan
    bind 127.0.0.1:8080

    # Some upstream proxies can send absolute-form URIs:
    #   GET http://box.lan/path HTTP/1.1
    # Convert to origin-form before sending to nginx:
    http-request set-uri %[req.uri,regsub(^https?://[^/]+,)] if { req.uri -m reg ^https?:// }

    # Keep backend behavior stable: always present Host as box.lan
    http-request set-header Host box.lan

    # Clean up proxy-only header sometimes sent by clients/proxies
    http-request del-header Proxy-Connection

    default_backend be_iiab

backend be_iiab
    server iiab 127.0.0.1:8085

    # Strip internal :8085 (and 127.0.0.1) from absolute redirects
    http-response replace-header Location ^(https?://)box\.lan:8085(.*)$ \1box.lan\2
    http-response replace-header Location ^(https?://)127\.0\.0\.1:8085(.*)$ \1box.lan\2
