<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet-in-a-Box on Android</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="top-header">
    <h1 class="header-title">Internet-in-a-Box on Android</h1>
</header>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Loading...</div>
</div>

<div id="backend-status" class="status-banner hidden" style="display: none; background-color: #ff4444; color: white; padding: 10px; text-align: center; width: 100%; position: absolute; top: 80px; z-index: 1000;">
    ⚠️ 
    <span data-i18n="backend_error">The backend server is not responding. Please verify it's started. Please go to the Termux App and run</span>
    <code>iiab-termux --start</code>
</div>

<div class="menu-container">
    <a href="/books" class="btn btn-books">
        <span>📖</span>
        <span data-i18n="books">Books</span>
    </a>

    <a href="/code" class="btn btn-code">
        <span>📱</span>
        <span data-i18n="code">Code on the Go</span>
    </a>

    <a href="/kiwix" class="btn btn-kiwix">
        <img src="img/kiwix_logo.svg" class="app-logo">
        <span data-i18n="kiwix">Kiwix</span>
    </a>

    <a href="/kolibri" class="btn btn-kolibri">
        <img src="img/kolibri_logo.svg" class="app-logo">
        <span data-i18n="kolibri">Kolibri</span>
    </a>

    <a href="/maps" class="btn btn-maps">
        <span>🗺️</span>
        <span data-i18n="maps">Maps</span>
    </a>

    <a href="/matomo" class="btn btn-matomo">
        <span>📊</span>
        <span data-i18n="matomo">Matomo</span>
    </a>

    <a href="/dashboard/" class="btn" style="background-color: #1e1e1e; border: 1px solid #5dbca5; color: #5dbca5; margin-top: 20px;">
        <span>⚙️</span>
        <span data-i18n="admin_dashboard">System Dashboard</span>
    </a>
</div>

<script src="js/app.js"></script>

</body>
</html>
